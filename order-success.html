<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fameshop — Order received</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,400..500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#0c0d10;--ink-soft:#41454f;--mute:#8b909c;--line:rgba(12,13,16,.09);--wash:#f5f6f8;--r:22px;--shadow:0 1px 2px rgba(12,13,16,.04),0 22px 48px -30px rgba(20,30,50,.30)}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;color:var(--ink);background:var(--wash);line-height:1.55}h1,h2,h3{font-family:Fraunces,Georgia,serif;font-weight:400;letter-spacing:-.02em;line-height:1.02;margin:0}.wrap{max-width:820px;margin:0 auto;padding:56px 24px}.logo{display:inline-flex;align-items:center;gap:9px;font-family:Fraunces,serif;font-size:22px;color:var(--ink);text-decoration:none}.logo-mark{width:24px;height:24px;border-radius:50%;background:var(--ink)}.card{background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:34px;margin-top:26px}.eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--mute)}.summary{border:1px solid var(--line);border-radius:18px;overflow:hidden;margin-top:22px}.row{display:flex;justify-content:space-between;gap:16px;padding:15px 18px;border-bottom:1px solid var(--line);font-size:14px}.row:last-child{border-bottom:none}.row span{color:var(--mute);font-weight:500}.row b{font-weight:600;text-align:right}.btn{display:inline-flex;align-items:center;justify-content:center;font-weight:600;font-size:15px;padding:14px 24px;border-radius:100px;border:1px solid transparent;text-decoration:none;margin-top:22px}.btn-primary{background:var(--ink);color:#fff}.btn-secondary{background:#fff;color:var(--ink);border-color:var(--line);margin-left:8px}.note{margin-top:16px;color:var(--ink-soft);font-size:14px}.pending{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:14px;padding:14px;margin-top:18px;font-size:13px}.ok{background:#ecfdf5;border:1px solid #bbf7d0;color:#166534;border-radius:14px;padding:14px;margin-top:18px;font-size:13px}@media(max-width:640px){.row{flex-direction:column;gap:4px}.row b{text-align:left}.btn{width:100%;margin-left:0}.btn-secondary{margin-left:0}}
</style>
</head>
<body>
<div class="wrap">
  <a class="logo" href="index.html"><span class="logo-mark"></span>Fame<b>shop</b></a>
  <div class="card">
    <span class="eyebrow">order received</span>
    <h1 style="font-size:38px;margin-top:12px">Your order is in.</h1>
    <p class="note">If webhook confirmation has already arrived, the status below will show as paid. If it still says pending, refresh in a few seconds.</p>
    <div id="status-box" class="pending">Checking payment status...</div>
    <div class="summary">
      <div class="row"><span>Order ID</span><b id="order-code">—</b></div>
      <div class="row"><span>Account</span><b id="account">—</b></div>
      <div class="row"><span>Service</span><b id="service">—</b></div>
      <div class="row"><span>Amount</span><b id="amount">—</b></div>
      <div class="row"><span>Status</span><b id="status">—</b></div>
    </div>
    <a class="btn btn-primary" href="index.html">Back to home</a>
    <a class="btn btn-secondary" id="refresh" href="#">Refresh status</a>
  </div>
</div>
<script>
const params = new URLSearchParams(location.search);
const code = params.get('order') || params.get('code');
const el = id => document.getElementById(id);
const cap = s => s ? s.charAt(0).toUpperCase()+s.slice(1) : '—';
function render(order){
  el('order-code').textContent = order.order_code;
  el('account').textContent = order.username ? '@'+order.username : '—';
  el('service').textContent = `${cap(order.platform)} ${cap(order.service)}`;
  el('amount').textContent = Number(order.amount || 0).toLocaleString('en-US');
  el('status').textContent = cap(order.status);
  const box = el('status-box');
  if(['paid','processing','delivered'].includes(order.status)){
    box.className = 'ok';
    box.textContent = 'Payment received. Your order is now in the delivery queue.';
  }else{
    box.className = 'pending';
    box.textContent = 'Payment is not confirmed yet. This may update after the webhook arrives.';
  }
}
async function load(){
  if(!code){ el('status-box').textContent = 'Missing order code.'; return; }
  el('order-code').textContent = code;
  try{
    const r = await fetch(`/api/order?code=${encodeURIComponent(code)}`, {cache:'no-store'});
    const j = await r.json().catch(()=>({}));
    if(!r.ok || !j.ok) throw new Error('Order not found.');
    render(j.order);
  }catch(e){ el('status-box').textContent = e.message || 'Could not load order.'; }
}
el('refresh').addEventListener('click', e=>{ e.preventDefault(); load(); });
load();
</script>
</body>
</html>
